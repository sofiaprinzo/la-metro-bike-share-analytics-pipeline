id: la_bike_share_pipeline
namespace: portfolio

description: |
  Orchestrates the local LA Metro Bike Share analytics pipeline.
  The flow expects the raw CSV files to already exist in data/raw.

tasks:
  - id: ingest_trips
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - python ingestion/ingest_trips.py

  - id: ingest_stations
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - python ingestion/ingest_stations.py

  - id: build_warehouse
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - python warehouse/build_warehouse.py

  - id: export_tableau_csvs
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - python export/export_tableau_csvs.py