services:
  pipeline:
    build: .
    volumes:
      - .:/app
    working_dir: /app

  streamlit:
    build: .
    command: streamlit run dashboard/streamlit/app.py --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    working_dir: /app

  kestra:
    build:
      context: .
      dockerfile: Dockerfile.kestra
    command: server local --no-tutorials
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - kestra-data:/home/kestra/.kestra
    profiles:
      - orchestration

volumes:
  kestra-data:
